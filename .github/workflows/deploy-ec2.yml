name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Site Files To EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: "index.html,assets,server.js,package.json,package-lock.json,data,.env.example,Team Info.xlsx"
          target: "/home/ec2-user/erpdash"
          rm: true

      - name: Deploy Static + Incident API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/erpdash

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js is not installed on EC2. Please install Node.js 20+ first."
              exit 1
            fi

            cd "$APP_DIR"
            npm ci --omit=dev

            if [ ! -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env.example" "$APP_DIR/.env"
            fi

            if [ -n "${{ secrets.EC2_SLACK_WEBHOOK_URL }}" ]; then
              cat > "$APP_DIR/.env" <<'EOF'
PORT=3000
SLACK_WEBHOOK_URL=${{ secrets.EC2_SLACK_WEBHOOK_URL }}
SLACK_ALLOW_INSECURE_TLS=false
EOF
            else
              if grep -q "^PORT=" "$APP_DIR/.env"; then
                sed -i "s/^PORT=.*/PORT=3000/" "$APP_DIR/.env"
              else
                echo "PORT=3000" >> "$APP_DIR/.env"
              fi
            fi

            cat > /tmp/erpdash-api.service <<'EOF'
[Unit]
Description=ERP Dash Incident API
After=network.target

[Service]
Type=simple
WorkingDirectory=/home/ec2-user/erpdash
ExecStart=/usr/bin/env node /home/ec2-user/erpdash/server.js
Restart=always
RestartSec=3
User=ec2-user
EnvironmentFile=/home/ec2-user/erpdash/.env

[Install]
WantedBy=multi-user.target
EOF

            sudo mv /tmp/erpdash-api.service /etc/systemd/system/erpdash-api.service
            sudo systemctl daemon-reload
            sudo systemctl enable erpdash-api
            sudo systemctl restart erpdash-api

            cat > /tmp/erpdash-nginx.conf <<'EOF'
server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
EOF

            sudo mkdir -p /usr/share/nginx/html
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /home/ec2-user/erpdash/. /usr/share/nginx/html/
            sudo chown -R nginx:nginx /usr/share/nginx/html
            sudo rm -f /etc/nginx/conf.d/default.conf
            sudo mv /tmp/erpdash-nginx.conf /etc/nginx/conf.d/erpdash.conf
            sudo nginx -t
            sudo systemctl restart nginx

            curl -fsS http://127.0.0.1/api/health >/dev/null
